# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser v2 configuration for ccc (Copilot Config CLI)
# See: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: ccc
    main: ./cmd/ccc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}}

archives:
  - name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - --bundle
      - ${artifact}.sig
      - --yes
      - ${artifact}

changelog:
  sort: asc
  use: github
